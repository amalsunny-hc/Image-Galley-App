version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: image_gallery_mysql
    env_file: .env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - gallery_network

  flask_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: image_gallery_app
    env_file: .env
    ports:
      - "5000:5000"
    volumes:
      - ./app:/app/app
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gallery_network
    command: python3 run.py
    # For AWS S3 integration:
    # If running on EC2, ensure the instance has an IAM role with S3 permissions
    # IAM role credentials will be automatically picked up by boto3

  phpmyadmin:
    image: phpmyadmin
    container_name: image_gallery_phpmyadmin
    env_file: .env
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - gallery_network

volumes:
  mysql_data:
    driver: local

networks:
  gallery_network:
    driver: bridge
