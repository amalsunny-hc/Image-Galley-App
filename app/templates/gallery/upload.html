{% extends "base.html" %}

{% block title %}Upload Image - Image Gallery{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h3 class="card-title mb-0">Upload Image</h3>
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data" novalidate>
                    <div class="mb-3">
                        <label for="file" class="form-label">Select Image</label>
                        <input type="file" class="form-control" id="file" name="file" accept="image/*" required>
                        <small class="form-text text-muted">Supported formats: JPG, PNG, GIF, WebP (Max 16MB)</small>
                    </div>

                    <div class="mb-3">
                        <label for="title" class="form-label">Title</label>
                        <input type="text" class="form-control" id="title" name="title" required>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="4"></textarea>
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="is_public" name="is_public" checked>
                        <label class="form-check-label" for="is_public">
                            Make this image public
                        </label>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Upload Image</button>
                        <a href="{{ url_for('gallery.index') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
